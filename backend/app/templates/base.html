<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Forest Intelligence System{% endblock %}</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- CSS Style Sheets -->
    <link rel="stylesheet" href="/static/css/main.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="app-sidebar">
            <div class="sidebar-brand">
                <span class="brand-logo" style="display: flex; align-items: center; color: var(--accent-action);">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2L4 12h5l-4 8h14l-4-8h5z"/>
                        <path d="M12 20v2"/>
                    </svg>
                </span>
                <span class="brand-name">Forest Intel</span>
            </div>
            <nav class="sidebar-nav">
                <a href="/" class="nav-item {% if active_page == 'aoi' %}active{% endif %}">
                    <span class="nav-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/>
                            <line x1="9" y1="3" x2="9" y2="18"/>
                            <line x1="15" y1="6" x2="15" y2="21"/>
                        </svg>
                    </span>
                    <span class="nav-label">AOI Selector</span>
                </a>
                <a href="/jobs" class="nav-item {% if active_page == 'jobs' %}active{% endif %}">
                    <span class="nav-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
                            <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
                            <circle cx="16" cy="16" r="4"/>
                            <polyline points="16 14 16 16 17.5 17.5"/>
                        </svg>
                    </span>
                    <span class="nav-label">Monitoring Jobs</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <span class="user-avatar" style="display: flex; align-items: center; color: var(--text-secondary);">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </span>
                    <span class="user-name">Guest User</span>
                </div>
            </div>
        </aside>

        <!-- Main Work Area -->
        <main class="app-main">
            <header class="main-header">
                <h1 class="header-title">{% block header_title %}Dashboard{% endblock %}</h1>
                <div class="header-actions">
                    {% block header_actions %}{% endblock %}
                </div>
            </header>
            <section class="main-content">
                {% block content %}{% endblock %}
            </section>
        </main>
    </div>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
