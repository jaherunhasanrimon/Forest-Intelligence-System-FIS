# A generic, single-database configuration.

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date
# local, utc, etc.
# timezone =

# max length of characters to prepend to the slug
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow empty migrations to be created
# and run
# allow_empty_history = false

# version location specification; this defaults
# to migrations/versions.  when using multiple version
# directories, paths must be separated by '@'
# version_locations = %(here)s/bar:%(here)s/bat:migrations/versions

# version path separator; defaults to os.pathsep.
# Use a space to span multiple lines in a single key
# version_path_separator = :

# set to 'true' to enable searching for version files recursively
# recursive_version_files = false

# the output encoding used when writing new migration files
# output_encoding = utf-8

sqlalchemy.url = mysql+pymysql://fis_user:fis_password@localhost:3306/forest_intel

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[loggers]
keys = root,sqlalchemy,alembic

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
